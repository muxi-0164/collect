<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師管理平台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFCFE; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass-header { backdrop-filter: blur(12px); background-color: rgba(253, 252, 254, 0.8); }
    </style>
</head>
<body class="text-slate-800">

    <div id="app">
        <!-- 載入中畫面 -->
        <div id="loading-screen" class="min-h-screen flex items-center justify-center bg-slate-50">
            <div class="text-center space-y-4">
                <i data-lucide="loader-2" class="w-10 h-10 text-violet-600 animate-spin mx-auto"></i>
                <p class="text-slate-500 font-medium">正在載入您的珍藏庫...</p>
            </div>
        </div>

        <!-- 主內容 (預設隱藏) -->
        <div id="main-content" class="hidden">
            <!-- 側邊導覽 -->
            <aside class="fixed left-0 top-0 h-full w-20 md:w-64 bg-white border-r border-slate-100 flex flex-col py-8 z-50 transition-all">
                <div class="px-6 mb-12 flex items-center space-x-3">
                    <div class="bg-violet-600 text-white p-2.5 rounded-2xl shadow-lg shadow-violet-200">
                        <i data-lucide="package" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-black text-slate-800 hidden md:block">珍藏大師</h1>
                </div>
                <nav class="flex-1 px-4 space-y-3" id="nav-menu">
                    <!-- Nav Items dynamically handled via JS -->
                </nav>
                <div class="px-4 mt-auto" id="auth-section">
                    <!-- Auth Button dynamically handled via JS -->
                </div>
            </aside>

            <!-- 主區域 -->
            <main class="pl-20 md:pl-64 min-h-screen">
                <header class="sticky top-0 glass-header px-8 py-6 z-40">
                    <div class="max-w-5xl mx-auto flex items-center justify-between">
                        <div class="relative flex-1 max-w-xl">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                            <input type="text" placeholder="搜尋您的珍藏..." class="w-full bg-white border border-slate-100 rounded-2xl py-3 pl-12 pr-4 shadow-sm outline-none focus:ring-4 focus:ring-violet-50 transition-all">
                        </div>
                        <div class="flex items-center space-x-4 ml-4" id="user-profile">
                            <!-- User profile content -->
                        </div>
                    </div>
                </header>

                <section class="max-w-5xl mx-auto px-8 py-8" id="page-content">
                    <!-- Page content dynamically injected -->
                </section>
            </main>
        </div>

        <!-- Modals -->
        <div id="modal-container" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
            <div class="bg-white rounded-[2.5rem] w-full max-w-lg p-8 relative shadow-2xl scale-in" id="modal-body">
                <!-- Modal content -->
            </div>
        </div>

        <!-- AI Floating Info -->
        <div id="ai-status" class="hidden fixed bottom-8 right-8 z-[120] bg-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3 border border-violet-100 animate-pulse">
            <i data-lucide="loader-2" class="text-violet-600 animate-spin w-5 h-5"></i>
            <span class="text-sm font-bold text-violet-600">AI 大師鑑定中...</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyD25X6tExfxP9bAI6luAiSraLUYzPIspEc",
            authDomain: "collect-91f4b.firebaseapp.com",
            projectId: "collect-91f4b",
            storageBucket: "collect-91f4b.firebasestorage.app",
            messagingSenderId: "474415007654",
            appId: "1:474415007654:web:1c1fb418d85e2837e8f167"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'master-collector-v1';

        // --- State Management ---
        let currentUser = null;
        let activeTab = 'home';
        let collectionsData = [];
        let wishlistData = [];
        let newItemImg = null;

        // --- Auth Logic ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth mismatch or failure, fallback to anonymous:", error);
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                setupListeners();
                renderUI();
            }
        });

        // --- Listeners (Firestore) ---
        let unsubItems, unsubWish;
        function setupListeners() {
            if (!currentUser) return;
            if (unsubItems) unsubItems();
            if (unsubWish) unsubWish();

            const itemsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
            unsubItems = onSnapshot(itemsRef, (snapshot) => {
                collectionsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (activeTab === 'home' || activeTab === 'collections') renderPage();
            });

            const wishRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'wishlist');
            unsubWish = onSnapshot(wishRef, (snapshot) => {
                wishlistData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (activeTab === 'wishlist') renderPage();
            });
        }

        // --- UI Rendering Functions ---
        function renderUI() {
            renderNav();
            renderAuthBtn();
            renderProfile();
            renderPage();
            lucide.createIcons();
        }

        function renderNav() {
            const nav = document.getElementById('nav-menu');
            const items = [
                { id: 'home', icon: 'home', label: '首頁看板' },
                { id: 'collections', icon: 'layers', label: '我的收藏' },
                { id: 'wishlist', icon: 'heart', label: '願望清單' }
            ];
            nav.innerHTML = items.map(item => `
                <button onclick="window.switchTab('${item.id}')" class="w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl transition-all ${activeTab === item.id ? 'bg-violet-50 text-violet-700 font-bold shadow-sm' : 'text-slate-400 hover:bg-slate-50'}">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span class="text-sm hidden md:block">${item.label}</span>
                </button>
            `).join('');
        }

        function renderAuthBtn() {
            const container = document.getElementById('auth-section');
            if (currentUser.isAnonymous) {
                container.innerHTML = `
                    <button onclick="window.loginGoogle()" class="w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-violet-600 bg-violet-50 hover:bg-violet-100 transition-all font-bold">
                        <i data-lucide="log-in" class="w-5 h-5"></i>
                        <span class="hidden md:block">Google 登入</span>
                    </button>
                `;
            } else {
                container.innerHTML = `
                    <button onclick="window.logout()" class="w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-rose-400 hover:bg-rose-50 transition-all font-bold">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        <span class="hidden md:block">登出</span>
                    </button>
                `;
            }
        }

        function renderProfile() {
            const container = document.getElementById('user-profile');
            const isAnon = currentUser.isAnonymous;
            container.innerHTML = `
                <div class="text-right hidden sm:block">
                    <div class="flex items-center justify-end space-x-1">
                        <p class="text-sm font-bold text-slate-800">${currentUser.displayName || (isAnon ? '訪客收藏家' : '未具名')}</p>
                        ${isAnon ? `
                            <button onclick="window.editNickname()" class="text-violet-500 hover:text-violet-700 p-0.5 transition-colors" title="修改暱稱">
                                <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                            </button>
                        ` : ''}
                    </div>
                    <p class="text-[10px] text-slate-400">UID: ${currentUser.uid.substring(0, 6)}... (${isAnon ? '訪客' : '成員'})</p>
                </div>
                <img src="${currentUser.photoURL || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + currentUser.uid}" class="w-10 h-10 rounded-xl border shadow-sm">
            `;
            lucide.createIcons();
        }

        function renderPage() {
            const container = document.getElementById('page-content');
            if (activeTab === 'home') {
                const totalValue = collectionsData.reduce((sum, i) => sum + (i.value || 0), 0);
                container.innerHTML = `
                    <div class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-violet-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-violet-100 h-44 flex flex-col justify-between">
                                <p class="text-violet-100 font-medium">總收藏估值</p>
                                <p class="text-4xl font-black">$${totalValue.toLocaleString()}</p>
                            </div>
                            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 h-44 flex flex-col justify-between shadow-sm">
                                <p class="text-slate-400 font-medium">收藏數量</p>
                                <p class="text-4xl font-black text-slate-800">${collectionsData.length} <span class="text-lg font-medium text-slate-400">件</span></p>
                            </div>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold mb-6">最近加入</h2>
                            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                ${collectionsData.slice(0, 4).map(item => `
                                    <div class="bg-white p-3 rounded-3xl border border-slate-100 group shadow-sm animate-fade-in">
                                        <div class="relative rounded-2xl overflow-hidden aspect-square mb-3">
                                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                                        </div>
                                        <h3 class="font-bold text-slate-700 truncate px-1">${item.name}</h3>
                                        <p class="text-violet-600 font-bold px-1">$${item.value?.toLocaleString()}</p>
                                    </div>
                                `).join('')}
                                ${collectionsData.length === 0 ? `
                                    <div class="col-span-full bg-slate-50/50 border border-dashed border-slate-100 rounded-[2rem] py-12 text-center text-slate-400">
                                        <i data-lucide="sparkles" class="w-8 h-8 mx-auto mb-2 text-violet-300"></i>
                                        <p class="text-sm">快去新增您的第一件寶物吧！</p>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'collections') {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">收藏寶庫</h2>
                            <button onclick="window.showAddModal('collection')" class="bg-violet-600 text-white px-6 py-3 rounded-2xl flex items-center font-bold text-sm shadow-lg shadow-violet-200 hover:bg-violet-700 transition-all">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> 新增收藏
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${collectionsData.map(item => `
                                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all">
                                    <div class="relative h-44 rounded-2xl overflow-hidden mb-4">
                                        <img src="${item.img}" class="w-full h-full object-cover">
                                        <button onclick="window.analyzeItem('${item.id}')" class="absolute top-3 right-3 bg-white/90 backdrop-blur p-2 rounded-xl text-violet-600 shadow-sm hover:scale-105 transition-transform">
                                            <i data-lucide="sparkles" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <h4 class="font-bold text-lg text-slate-800">${item.name}</h4>
                                            <p class="text-slate-400 text-sm">收藏項目</p>
                                        </div>
                                        <button onclick="window.deleteItem('${item.id}', 'collection')" class="text-rose-300 hover:text-rose-500 transition-colors">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                                        <span class="text-xl font-black text-violet-600">$${item.value?.toLocaleString()}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (activeTab === 'wishlist') {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">願願清單</h2>
                            <button onclick="window.showAddModal('wishlist')" class="bg-slate-800 text-white px-6 py-3 rounded-2xl flex items-center font-bold text-sm shadow-lg hover:bg-slate-900 transition-all">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> 新增願望
                            </button>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            ${wishlistData.map(item => `
                                <div class="bg-white p-6 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm">
                                    <div>
                                        <h4 class="font-bold text-slate-800">${item.name}</h4>
                                        <p class="text-sm text-slate-400">目標價格: $${item.targetPrice?.toLocaleString()}</p>
                                    </div>
                                    <button onclick="window.deleteItem('${item.id}', 'wishlist')" class="text-slate-200 hover:text-rose-400 p-2 transition-colors">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        // --- Window Globals for HTML onclick ---
        window.switchTab = (tab) => {
            activeTab = tab;
            renderUI();
        };

        window.loginGoogle = async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (e) {
                console.error("Login failed", e);
                if (e.code === 'auth/unauthorized-domain') {
                    showDomainErrorModal(window.location.hostname);
                } else {
                    alert("登入失敗: " + e.message);
                }
            }
        };

        window.logout = async () => {
            await signOut(auth);
            await signInAnonymously(auth);
        };

        window.editNickname = () => {
            const modal = document.getElementById('modal-container');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <h3 class="text-2xl font-bold mb-4 text-slate-800">設定您的專屬暱稱</h3>
                <p class="text-sm text-slate-500 mb-6">自訂一個具有儀式感的暱稱，平台與 AI 分析報告都將以這個名稱稱呼您！</p>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-2">我的暱稱</label>
                        <input type="text" id="nickname-input" class="w-full bg-slate-50 border-transparent rounded-2xl py-4 px-5 outline-none focus:bg-white focus:ring-2 focus:ring-violet-100" placeholder="例如：首席收藏家" value="${currentUser.displayName || ''}">
                    </div>
                </div>
                <button onclick="window.saveNickname()" class="w-full mt-8 bg-violet-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-violet-100 active:scale-95 transition-all">
                    確定儲存
                </button>
            `;
            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.saveNickname = async () => {
            const input = document.getElementById('nickname-input');
            const newName = input ? input.value.trim() : '';
            if (!newName) return;
            
            try {
                await updateProfile(auth.currentUser, { displayName: newName });
                currentUser = auth.currentUser;
                renderProfile();
                window.closeModal();
            } catch (e) {
                console.error("Failed to update nickname", e);
                alert("暱稱儲存失敗，請重試。");
            }
        };

        window.showAddModal = (type) => {
            const modal = document.getElementById('modal-container');
            const body = document.getElementById('modal-body');
            newItemImg = null;

            body.innerHTML = `
                <h3 class="text-2xl font-bold mb-6">${type === 'collection' ? '新增收藏' : '設定願望'}</h3>
                <div class="space-y-5">
                    ${type === 'collection' ? `
                        <div class="flex justify-center mb-6">
                            <label class="relative w-32 h-32 rounded-3xl bg-slate-50 border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer overflow-hidden group">
                                <div id="preview-box" class="flex flex-col items-center">
                                    <i data-lucide="camera" class="text-slate-400 group-hover:text-violet-500 w-8 h-8"></i>
                                    <span class="text-[10px] font-bold text-slate-400 mt-2">上傳照片</span>
                                </div>
                                <input type="file" id="file-input" class="hidden" accept="image/*">
                            </label>
                        </div>
                    ` : ''}
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-2">項目名稱</label>
                        <input type="text" id="new-name" class="w-full bg-slate-50 border-transparent rounded-2xl py-4 px-5 outline-none focus:bg-white focus:ring-2 focus:ring-violet-100">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-2">${type === 'collection' ? '估算價值' : '目標價格'}</label>
                        <input type="number" id="new-val" class="w-full bg-slate-50 border-transparent rounded-2xl py-4 px-5 outline-none focus:bg-white focus:ring-2 focus:ring-violet-100">
                    </div>
                </div>
                <button onclick="window.saveItem('${type}')" class="w-full mt-8 bg-violet-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-violet-100 active:scale-95 transition-all">
                    儲存
                </button>
            `;

            modal.classList.remove('hidden');
            lucide.createIcons();

            const fileIn = document.getElementById('file-input');
            if (fileIn) {
                fileIn.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        newItemImg = reader.result;
                        document.getElementById('preview-box').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover animate-fade-in">`;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                };
            }
        };

        // 彈出錯誤指引 Modal
        function showDomainErrorModal(currentHostname) {
            const modal = document.getElementById('modal-container');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="flex items-center space-x-2 text-amber-500 mb-4 animate-bounce">
                    <i data-lucide="shield-alert" class="w-8 h-8"></i>
                    <h3 class="text-xl font-bold">網域安全驗證指引</h3>
                </div>
                <div class="space-y-4 text-slate-600 text-sm leading-relaxed">
                    <p>因 Firebase 安全政策限制，目前的 Google 彈出登入需要手動將此臨時網域新增至您的 Firebase 主控台中。</p>
                    
                    <div class="bg-violet-50/50 p-4 rounded-2xl space-y-2 border border-violet-100">
                        <p class="font-bold text-xs text-violet-700">💡 溫馨提醒：不必登入也能使用！</p>
                        <p class="text-xs text-slate-600">您目前使用的是獨立且安全的「訪客通道」，所有的收藏功能與雲端儲存皆已啟用。您可以直接點擊右上角自訂個人暱稱！</p>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl space-y-2">
                        <p class="font-bold text-xs text-slate-400">目前運行的網域（請點擊複製）</p>
                        <div class="flex items-center justify-between bg-white p-2.5 rounded-xl border border-slate-100">
                            <span class="font-mono text-xs select-all break-all text-violet-600" id="domain-string">${currentHostname}</span>
                        </div>
                    </div>

                    <div class="space-y-2 text-xs">
                        <p class="font-bold text-slate-800 text-sm">🛠️ 如何啟用 Google 登入？</p>
                        <ol class="list-decimal pl-5 space-y-1 text-slate-500">
                            <li>前往您的 <a href="https://console.firebase.google.com/" target="_blank" class="text-violet-600 font-bold underline">Firebase 主控台</a>。</li>
                            <li>選擇您的專案 <b>collect-91f4b</b>。</li>
                            <li>點擊左側 <b>Authentication</b>（驗證），然後切換至 <b>Settings</b>（設定）標籤。</li>
                            <li>展開左下方的 <b>Authorized domains</b>（授權網域）區塊。</li>
                            <li>點擊 <b>Add domain</b>，將上方複製的網域貼上並儲存即可！</li>
                        </ol>
                    </div>
                </div>
                <button onclick="window.closeModal()" class="w-full mt-6 bg-slate-100 py-3.5 rounded-2xl font-bold text-slate-500 hover:bg-slate-200 transition-all">
                    我知道了，先使用訪客模式
                </button>
            `;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        window.closeModal = () => {
            document.getElementById('modal-container').classList.add('hidden');
        };

        window.saveItem = async (type) => {
            const name = document.getElementById('new-name').value;
            const val = document.getElementById('new-val').value;
            if (!name) return;

            const path = type === 'collection' ? 'items' : 'wishlist';
            const data = type === 'collection' ? {
                name,
                value: Number(val) || 0,
                img: newItemImg || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400&q=80',
                date: new Date().toISOString()
            } : {
                name,
                targetPrice: Number(val) || 0
            };

            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, path), data);
            window.closeModal();
        };

        window.deleteItem = async (id, type) => {
            const path = type === 'collection' ? 'items' : 'wishlist';
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, path, id));
        };

        window.analyzeItem = async (id) => {
            const item = collectionsData.find(i => i.id === id);
            document.getElementById('ai-status').classList.remove('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `請分析這件收藏品：${item.name}，價值 ${item.value} 元。` }] }] })
                });
                const data = await response.json();
                const content = data.candidates?.[0]?.content?.parts?.[0]?.text || "分析失敗";
                
                // 顯示分析結果 Modal
                const modal = document.getElementById('modal-container');
                const body = document.getElementById('modal-body');
                body.innerHTML = `
                    <h3 class="text-xl font-bold text-violet-600 mb-4">✨ ${item.name} 鑑定報告</h3>
                    <div class="text-slate-600 leading-relaxed max-h-96 overflow-y-auto pr-2 scrollbar-hide">
                        ${content}
                    </div>
                    <button onclick="window.closeModal()" class="w-full mt-8 bg-slate-100 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-200">關閉</button>
                `;
                modal.classList.remove('hidden');
            } catch (e) {
                console.error(e);
            }
            document.getElementById('ai-status').classList.add('hidden');
        };

        // Start init
        initAuth();
    </script>
</body>
</html>
